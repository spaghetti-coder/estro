---
global:
  title: Estro
  subtitle: Config test suite
  hostname: 0.0.0.0
  port: 3000
  timeout: 30
  confirm: true
  restricted: false
users:
  alice:
    password: '$2y$10$hash1'
    groups: [admins]
  bob:
    password: '$2y$10$hash2'
    groups: [admins, family]
  guest:
    password: '$2y$10$hash3'
sections:
  - title: Public Info
    collapsable: false
    columns: 1
    services:
      - title: Uptime
        command: uptime
      - title: Date
        command: date
        confirm: false
  - title: System
    services:
      - title: Disk usage
        command:
          - df -h /
          - echo "---"
          - df -h --total | tail -1
      - title: Memory
        command: free -h
        confirm: false
      - title: CPU
        command: ps aux --sort=-%cpu | head -10
        timeout: 10
      - title: Load
        command: cat /proc/loadavg
        confirm: false
  - title: Logs
    timeout: 15
    confirm: false
    columns: 2
    services:
      - title: Syslog (20)
        command: journalctl -n 20 --no-pager
      - title: Kernel log
        command: dmesg | tail -20
      - title: Auth log
        command: journalctl -n 20 -u ssh --no-pager
        confirm: true
        timeout: 5
  - title: Admin
    allowed: [admins]
    columns: 4
    services:
      - title: List /etc
        command: ls -lah /etc
      - title: Who
        command: who
        confirm: false
  - title: Mixed Access
    allowed: [admins]
    services:
      - title: Public status
        command: uptime
        allowed: []
        confirm: false
      - title: Admin only
        command: id
      - title: Guest allowed
        command: date
        allowed: [guest]
  - title: Remote (single hop)
    allowed: [admins]
    remote: server1.local
    confirm: false
    services:
      - title: Remote uptime
        command: uptime
      - title: Remote disk
        command: df -h /
      - title: Local override
        command: hostname
        allowed: [admins, guest]
  - title: Remote (chain)
    allowed: [admins]
    collapsable: false
    columns: 2
    services:
      - title: Two-hop uptime
        command: uptime
        remote: [server1.local, server2.local]
        confirm: false
      - title: Three-hop date
        command: date
        remote: [server1.local, server2.local, server3.local]
        confirm: false
        timeout: 20
