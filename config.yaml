---
global:
  # ~~~ Server ~~~
  # Page heading
  title: Estro
  subtitle: Config test suite
  # Bind address (default 127.0.0.1:3000)
  hostname: 0.0.0.0
  port: 3000
  secret:               # session secret (random per restart if omitted)
  # ~~~ Cascading (most specific wins): global → section ~~~
  collapsable: true     # sections can be collapsed (default: true)
  columns: 3            # buttons per row on desktop ≥1024px (default: 3)
  # ~~~ Cascading (most specific wins): global → section → service ~~~
  timeout: 30           # command timeout in seconds (default: 60) 
  confirm: true         # show confirm dialog before running (default: true)
  allowed: []           # user/group who can run; [] = public (default: [])
  restricted: false     # restrict visibility to allowed users only (default: true)
  remote: []            # run on remote host over ssh; [] = local (default: [])
  enabled: true         # enable/disable entity (default: true)

# ---------------------------------------------------------------------------
# users: bcrypt hashes (cost 10). Groups are optional.
# Generate password with:
#   docker run --rm httpd htpasswd -bnBC 10 "" PASS | tr -d ':\n'
# ---------------------------------------------------------------------------
users:
  alice:                  # Password: changeme1
    password: '$2y$10$6c9tQEpF4w2Ev9XCLH2pauAawy2874wwgN5jCTyrYMYclVlTTNIs2'
    groups: [admins]
  bob:                    # Password: changeme2
    password: '$2y$10$IMxjm44TuD0J0JAHeqzcdOufsumn.G2Y.ZS15EOQq9vbmCg48Zvnm'
    groups: [admins, family]
  guest:                  # Password: changeme3
    password: '$2y$10$VIRU2eYVGPRE1qf5PqDCQuSt9RPLd/0E2HxjmZeU6ELIgsFFmQn/C'

sections:
  # Public (no `allowed`)
  # Always open (collapsable: false)
  # Single-column (columns: 1)
  - title: Public Info
    collapsable: false
    columns: 1
    services:
      - title: Uptime           # confirm inherits global true
        command: uptime
      - title: Date
        command: date
        confirm: false          # override: no dialog for this service

  # Public (no `allowed`)
  # Collapsable (inherits `global.collapsable`)
  # 3 columns (inherits `global.columns`)
  - title: System
    services:
      - title: Disk usage
        command:                # multi-step: joined with &&
          - df -h /            
          - echo "---"
          - df -h --total | tail -1
      - title: Memory
        command: free -h
        confirm: false
      - title: CPU
        command: ps aux --sort=-%cpu | head -10
        timeout: 10             # service-level timeout overrides section + global
      - title: Load
        command: cat /proc/loadavg
        confirm: false

  - title: Logs
    timeout: 15                 # all services in this section default to 15s
    confirm: false              # all services skip dialog unless overridden
    columns: 2
    services:
      - title: Syslog (20)
        command: journalctl -n 20 --no-pager
      - title: Auth log
        command: journalctl -n 20 -u ssh --no-pager
        confirm: true           # override section confirm back on
        timeout: 5              # override section timeout

  - title: Mixed Access (admins by default)
    allowed: [admins]           # restrict to admins group users by default
    restricted: true            # hidden from non-admins (explicit, same as default)
    columns: 4
    services:
      - title: List /etc
        command: ls -lah /etc
      - title: Public status
        command: uptime
        allowed: []             # overrides section restriction, now public
        confirm: false
      - title: Guest only date
        command: date
        allowed: [guest]        # restricted to user only, not group
      - title: Unrestricted Who
        command: who
        confirm: false
        restricted: false       # overrides section restriction, now public
      - title: Processes
        command: ps aux | head -20
        confirm: false
      - title: Routes
        command: ip route
        confirm: false
      - title: Disk inodes
        command: df -i
        confirm: false

  - title: Visible by bob only
    allowed: [bob]
    restricted: true            # hidden from non-admins (restricted=true = not visible)
    confirm: false
    services:
      - title: Status check
        command: uptime
      - title: Admin process list
        command: ps aux | head -20

  - title: Remote (single hop)
    allowed: [admins]
    remote: localhost           # command → ssh to host, then run command
    confirm: false
    services:
      - title: Remote uptime
        command: uptime
      - title: Remote disk
        command: df -h /
      - title: Local override
        command: hostname
        remote: []              # override remote, run locally instead
        allowed: [admins, guest]

  # ~~~ Remote: SSH chain (multi-hop) ~~~
  # remote: [host1, host2] → ssh host1, then ssh host2, then run
  - title: Remote (chain)
    allowed: [admins]
    collapsable: false
    columns: 2
    services:
      - title: Two-hop uptime
        command: uptime
        remote: [localhost, localhost]
        confirm: false
      - title: Three-hop date
        command: date
        remote: [localhost, localhost, localhost]
        confirm: false
        timeout: 20

  # With `enabled: false` the item is:
  # - invisible in the UI with Disabled toggle off
  # - visible but disabled (grayed out) with Disabled toggle on
  - title: Disabled section
    enabled: false              # The whole section is disabled
    services:
      - title: Uptime
        command: uptime

  - title: Partially disabled section
    enabled: false
    services:
      - title: Uptime
        command: uptime
      - title: List /etc
        command: ls -lah /etc
        enabled: true           # The whole section is disabled
