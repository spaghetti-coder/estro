<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Estro</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="site-header">
  <div class="site-header-inner">
    <div class="site-header-left">
      <div class="site-title-row">
        <img src="/favicon.svg" class="site-logo" alt="" aria-hidden="true" />
        <div>
          <h1 id="site-title"></h1>
          <p id="site-subtitle" class="site-subtitle"></p>
        </div>
      </div>
    </div>
    <div class="site-header-right">
      <div class="gear-wrap">
        <button id="gearBtn" class="btn ghost gear-btn" type="button" aria-label="Settings" aria-expanded="false">⚙</button>
        <div id="gearPanel" class="gear-panel" hidden>
          <div id="authArea" class="gear-row"></div>
          <div class="gear-row gear-row-theme">
            <span class="gear-label">Theme</span>
            <label class="theme-toggle">
              <input id="themeToggle" type="checkbox" aria-label="Toggle theme" />
              <span class="track" aria-hidden="true"></span>
              <span class="knob" aria-hidden="true">🌙</span>
            </label>
          </div>
        </div>
      </div>
    </div>
  </div>
  </header>

  <main class="container" id="app">
    <section class="buttons" aria-label="Service controls" id="buttons"></section>
  </main>

  <!-- modal -->
  <div id="confirmModal" class="modal" role="dialog" aria-modal="true" aria-hidden="true" aria-describedby="modalBody">
    <div class="modal-panel" role="document" tabindex="-1">
      <header class="modal-header">
        <span class="modal-icon" aria-hidden="true">⚠️</span>
        <h2 id="modalTitle">Confirm the action</h2>
      </header>
      <div id="modalBody" class="modal-body">Are you sure?</div>
      <footer class="modal-footer">
        <button id="modalCancel" class="btn ghost">Cancel</button>
        <button id="modalConfirm" class="btn primary">Confirm</button>
      </footer>
    </div>
  </div>

  <!-- login modal -->
  <div id="loginModal" class="modal" role="dialog" aria-modal="true"
       aria-labelledby="loginModalTitle" aria-hidden="true">
    <div class="modal-panel login-modal-panel" role="document" tabindex="-1">
      <header class="modal-header">
        <span class="modal-icon" aria-hidden="true">🔐</span>
        <h2 id="loginModalTitle">Login</h2>
        <button id="loginModalClose" class="btn ghost modal-close-btn" type="button" aria-label="Close">×</button>
      </header>
      <div class="modal-body">
        <div class="form-group">
          <label for="userFilter">User</label>
          <input id="userFilter" class="form-input" type="text" placeholder="Filter users…" autocomplete="off" />
          <select id="userSelect" class="form-input"></select>
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <div class="input-wrap">
            <input id="loginPassword" class="form-input" type="password" autocomplete="current-password" />
            <button type="button" id="togglePassword" class="input-eye" aria-label="Toggle password visibility">
              <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="form-group form-group-inline">
          <input id="rememberMe" type="checkbox" checked />
          <label for="rememberMe">Remember me</label>
        </div>
        <div id="loginError" class="login-error" aria-live="assertive"></div>
      </div>
      <footer class="modal-footer">
        <button id="loginSubmit" class="btn" type="button">Login</button>
      </footer>
    </div>
  </div>

  <!-- toast area (aria-live) -->
  <div id="toasts" class="toasts" aria-live="polite" aria-atomic="true"></div>

  <template id="tpl-button">
    <button class="btn"></button>
  </template>

  <template id="tpl-toast">
    <div class="toast">
      <span class="toast-icon"></span>
      <span class="toast-message"></span>
      <button class="toast-logs-btn" type="button" aria-label="View logs">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      </button>
      <button class="toast-close-btn" type="button" aria-label="Close">×</button>
    </div>
  </template>

  <!-- logs modal -->
  <div id="logsModal" class="modal" role="dialog" aria-modal="true" aria-hidden="true" aria-labelledby="logsModalTitle">
    <div class="modal-panel logs-modal-panel" role="document" tabindex="-1">
      <header class="modal-header">
        <h2 id="logsModalTitle">Task Logs</h2>
        <button id="logsModalClose" class="btn ghost modal-close-btn" type="button" aria-label="Close">×</button>
      </header>
      <div class="logs-tabs">
        <button class="logs-tab active" data-tab="stdout" type="button">stdout</button>
        <button class="logs-tab" data-tab="stderr" type="button">stderr</button>
      </div>
      <div id="logsStdout" class="logs-content"></div>
      <div id="logsStderr" class="logs-content" hidden></div>
    </div>
  </div>

  <script src="/ui.js" defer></script>
</body>
</html>
